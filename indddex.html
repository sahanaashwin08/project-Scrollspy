<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Scrollspy Project</title>
  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      position: relative;
    }
    #sidebar {
      height: 100vh;
      position: fixed;
      top: 56px; /* height of navbar */
      left: 0;
      width: 200px;
      overflow-y: auto;
      background-color: #f8f9fa;
    }
    #content {
      margin-left: 220px;
      padding: 20px;
    }
    section {
      height: 500px;
      padding-top: 20px;
    }
    .bg-blue {
      background-color: #007bff;
      color: white;
    }
  </style>
</head>
<body data-spy="scroll" data-target="#sidebar" data-offset="0">

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">Scrollspy Demo</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#services">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Sidebar -->
  <div id="sidebar" class="list-group">
    <a class="list-group-item list-group-item-action active" href="#home">Home</a>
    <a class="list-group-item list-group-item-action" href="#about">About</a>
    <a class="list-group-item list-group-item-action" href="#services">Services</a>
    <a class="list-group-item list-group-item-action" href="#contact">Contact</a>
  </div>

  <!-- Content -->
  <div id="content">
    <section id="home" class="bg-blue">
      <h2>Home</h2>
      <p>Scroll down to see Scrollspy in action.</p>
    </section>
    <section id="about">
      <h2>About</h2>
      <p>This is the About section.</p>
    </section>
    <section id="services" class="bg-light">
      <h2>Services</h2>
      <p>This is the Services section.</p>
    </section>
    <section id="contact">
      <h2>Contact</h2>
      <p>This is the Contact section.</p>
    </section>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
